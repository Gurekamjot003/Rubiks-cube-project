<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube WASM Engine</title>
    <link rel="stylesheet" href="style.css">

    <!-- Dependencies (Local) -->
    <script src="three.min.js"></script>

    <!-- App Logic & Module Definition (must be before RubiksCube.js) -->
    <script src="script.js"></script>
    <script src="engine.js"></script>

    <!-- Emscripten Output (must be last) -->
    <script src="RubiksCube.js"></script>
</head>

<body>

    <!-- Theme Toggle Button -->
    <button id="themeToggle" class="theme-toggle" title="Toggle Light/Dark Theme">
        <span class="icon">☀️</span>
    </button>

    <!-- Loading Indicator Overlay -->
    <div id="solve-loading-overlay" class="hidden" style="display: none;">
        <div class="loading-container">
            <div class="spinner"></div>
            <p class="loading-text">Solving cube internally...</p>
        </div>
    </div>

    <!-- Entry Page -->
    <div id="entry-page">
        <h1>Rubik's Cube WASM Engine</h1>
        <p>Enter the size of the cube to begin.</p>
        <div class="control-group">
            <label for="cubeSizeInput">Cube Size:</label>
            <input type="number" id="cubeSizeInput" value="3" min="2" max="20" title="Enter cube size between 2 and 20">
            <button id="startButton" disabled>Loading WASM...</button>
        </div>
    </div>

    <!-- Main Application Page (hidden by default) -->
    <div id="main-page" class="hidden">
        <div id="cube-container">
            <div id="cube-box-wrapper">
                <h2>3d rubiks cube</h2>
                <div id="canvas-container"></div> <!-- Canvas will be injected here -->
            </div>
        </div>
        <div id="controls-panel">
            <h2>Controls</h2>
            <div class="control-group">
                <button id="scrambleButton">Scramble</button>
                <button id="resetButton">Reset</button>
                <button id="resetCameraButton">Reset View</button>
            </div>
            <div class="control-group">
                <input type="text" id="moveInput" placeholder="e.g., R U R' U'">
                <button id="applyMoveButton">Apply Move</button>
            </div>
            <div class="control-group" id="solve-control-group">
                <select id="solverSelect" title="Select a solving algorithm">
                    <option value="LBL">Layer-by-Layer</option>
                    <option value="CFOP">CFOP</option>
                    <option value="Kociemba">Kociemba's</option>
                </select>
                <button id="solveButton">Solve</button>
            </div>
            
            <div class="control-group">
                <button id="editCubeButton">Edit Cube</button>
            </div>

            <!-- Color Picker Panel -->
            <div id="color-picker-panel" class="hidden">
                <h2>Set Cubie Color</h2>
                <div class="control-group">
                    <select id="colorFaceSelect" title="Select Face">
                        <option value="UP">Up</option>
                        <option value="DOWN">Down</option>
                        <option value="FRONT">Front</option>
                        <option value="BACK">Back</option>
                        <option value="LEFT">Left</option>
                        <option value="RIGHT">Right</option>
                    </select>
                    <input type="number" id="colorXInput" placeholder="X (0-index)" min="0" value="0">
                    <input type="number" id="colorYInput" placeholder="Y (0-index)" min="0" value="0">
                </div>
                <div class="control-group" style="margin-top: 10px;">
                    <select id="colorSelect" title="Select Color">
                        <option value="WHITE">White</option>
                        <option value="GREEN">Green</option>
                        <option value="RED">Red</option>
                        <option value="BLUE">Blue</option>
                        <option value="ORANGE">Orange</option>
                        <option value="YELLOW">Yellow</option>
                        <option id="emptyColorOption" value="EMPTY">Light Gray (Empty)</option>
                    </select>
                    <button id="applyColorButton">Apply Color</button>
                </div>
                <div class="control-group" style="margin-top: 10px;">
                    <button id="clearCubeButton">Clear Cube</button>
                    <button id="closeColorPickerButton">Close</button>
                </div>
            </div>

            <!-- Solution Panel (hidden by default) -->
            <div id="solution-panel" class="hidden">
                <h2>Solution</h2>
                <div id="solution-info"></div>
                <div id="solution-moves"></div>

                <!-- Speed Control -->
                <div class="speed-control">
                    <span>Speed:</span>
                    <button id="speedDecreaseButton">−</button>
                    <div class="speed-display" id="speedDisplay">1x</div>
                    <button id="speedIncreaseButton">+</button>
                </div>

                <!-- Custom Moves Input -->
                <div class="custom-moves-input control-group">
                    <input type="number" id="customMovesInput" placeholder="Apply N moves" min="1"
                        title="Enter number of moves to apply">
                    <button id="applyCustomMovesButton">Apply N</button>
                </div>

                <div class="control-group">
                    <button id="applyNextMoveButton">Apply Next Move</button>
                    <button id="applyAllMovesButton">Apply All Moves</button>
                    <button id="stopButton" class="stop-button hidden">Stop</button>
                    <button id="closeSolutionButton">Close</button>
                </div>
            </div>
        </div>
    </div>



</body>

</html>
